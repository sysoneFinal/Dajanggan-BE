version: '3.8'

services:
  # Spring Boot Application
  spring-boot-app:
    image: spring-boot-app:latest
    container_name: spring-boot-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - GOOGLE_DB_URL=${GOOGLE_DB_URL}
      - GOOGLE_DB_USERNAME=${GOOGLE_DB_USERNAME}
      - GOOGLE_DB_PASSWORD=${GOOGLE_DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - APP_CRYPTO_KEYS_V1=${APP_CRYPTO_KEYS_V1}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - redis
    networks:
      - app-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
