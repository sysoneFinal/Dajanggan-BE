version: '3.8'

services:
  # Spring Boot Backend
  backend:
    image: dongworry/dajanggan-backend:latest
    container_name: dajanggan-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - GOOGLE_DB_URL=${GOOGLE_DB_URL}
      - GOOGLE_DB_USERNAME=${GOOGLE_DB_USERNAME}
      - GOOGLE_DB_PASSWORD=${GOOGLE_DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - APP_CRYPTO_KEYS_V1=${APP_CRYPTO_KEYS_V1}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - dajanggan-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis
  redis:
    image: redis:7.0-alpine
    container_name: dajanggan-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - dajanggan-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  dajanggan-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
