name: Deploy to GCP VM
on:
  push:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Build Docker image
        run: |
          docker build -t spring-boot-app:latest .

      - name: Save Docker image
        run: |
          docker save spring-boot-app:latest | gzip > spring-boot-app.tar.gz

      - name: Copy Docker image to VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "spring-boot-app.tar.gz"
          target: "/home/${{ secrets.VM_USER }}"

      - name: Deploy on VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Docker 이미지 로드
            docker load < /home/${{ secrets.VM_USER }}/spring-boot-app.tar.gz
            
            # 기존 컨테이너 중지 및 제거
            docker stop spring-boot-app || true
            docker rm spring-boot-app || true
            
            # 새 컨테이너 실행
            docker run -d \
              --name spring-boot-app \
              --restart unless-stopped \
              -p 8080:8080 \
              -e DB_USERNAME=${{ secrets.DB_USERNAME }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              spring-boot-app:latest
            
            # 이미지 파일 삭제
            rm /home/${{ secrets.VM_USER }}/spring-boot-app.tar.gz
            
            # 로그 확인
            sleep 5
            docker logs spring-boot-app --tail 50