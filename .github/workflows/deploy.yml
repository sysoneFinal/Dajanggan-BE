name: Deploy to GCP VM
on:
  push:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Build Docker image
        run: |
          docker build -t spring-boot-app:latest .

      - name: Save Docker image
        run: |
          docker save spring-boot-app:latest | gzip > spring-boot-app.tar.gz

      - name: Copy files to VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "spring-boot-app.tar.gz,docker-compose.yml"
          target: "/home/${{ secrets.VM_USER }}/app"

      - name: Deploy on VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/${{ secrets.VM_USER }}/app
            
            # Docker 이미지 로드
            docker load < spring-boot-app.tar.gz
            
            # .env.prod 파일 생성 (환경변수 설정)
            cat > .env.prod << EOF
            GOOGLE_DB_URL=${{ secrets.GOOGLE_DB_URL }}
            GOOGLE_DB_USERNAME=${{ secrets.GOOGLE_DB_USERNAME }}
            GOOGLE_DB_PASSWORD=${{ secrets.GOOGLE_DB_PASSWORD }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            APP_CRYPTO_KEYS_V1=${{ secrets.APP_CRYPTO_KEYS_V1 }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            EOF
            
            # Docker Compose로 기존 컨테이너 중지 및 새로 실행
            docker-compose --env-file .env.prod down
            docker-compose --env-file .env.prod up -d
            
            # 이미지 파일 삭제
            rm spring-boot-app.tar.gz
            
            # 로그 확인
            sleep 5
            docker-compose logs --tail 50