spring:
  application:
    name: Dajanggan

  datasource:
    url: ${GOOGLE_DB_URL}
    username: ${GOOGLE_DB_USERNAME}
    password: ${GOOGLE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  batch:
    jdbc:
      initialize-schema: always
      platform: postgres
      table-prefix: BATCH_          # Postgres DDL과 일치시키기
      schema: public                # 테이블을 만들 스키마 지정 (기본 public)

server:
  port: 8080

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.dajanggan.domains
  configuration:
    map-underscore-to-camel-case: true
    jdbc-type-for-null: NULL
    default-fetch-size: 100
    default-statement-timeout: 30
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    lazy-loading-enabled: false
    aggressive-lazy-loading: false

logging:
  level:
    root: INFO                           # 기본은 INFO
    com.dajanggan: INFO                  # 전체 INFO
    com.dajanggan.domain.metric.collector: DEBUG  # 수집기만 DEBUG
    org.apache.ibatis: WARN
    com.zaxxer.hikari: WARN