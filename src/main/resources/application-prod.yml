spring:
  application:
    name: Dajanggan

  # .env import
  config:
    import: optional:file:.env[.properties]

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${GOOGLE_DB_URL}
    username: ${GOOGLE_DB_USERNAME}
    password: ${GOOGLE_DB_PASSWORD}

  # Redis 설정
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

server:
  port: 8080

mybatis:

  # crypto 설정
  type-handlers-package: com.dajanggan.global.crypto.mybatis

  # Mapper XML ??
  mapper-locations: classpath:mapper/**/*.xml

  # Type Alias ???
  type-aliases-package: com.dajanggan.domain.**.domain

  # MyBatis ??
  configuration:
    map-underscore-to-camel-case: true   # snake_case ? camelCase ?? ??
    jdbc-type-for-null: NULL             # NULL ?? ??
    default-fetch-size: 100              # ?? Fetch ??
    default-statement-timeout: 30        # ?? ???? (30?)
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl  # ??
    lazy-loading-enabled: false          # Lazy Loading ????
    aggressive-lazy-loading: false

# PostgreSQL
postgres:
  stats:
    reset-detection: true
    snapshot-interval: 300

logging:
  level:
#    com.dajanggan: DEBUG
#    com.dajanggan.domain.engine: DEBUG
#    org.apache.ibatis: DEBUG
#    com.zaxxer.hikari: INFO
    org.springframework.web: DEBUG

    com.zaxxer.hikari: DEBUG     # HikariCP 연결 로그
    org.apache.ibatis: DEBUG     # MyBatis 실행 로그
    org.mybatis: DEBUG

    com.dajanggan: DEBUG         # 네 프로젝트 전체
    com.dajanggan.domain.engine: DEBUG

app:
  crypto:
    active-key-id: 1
    keys-v1: ${APP_CRYPTO_KEYS_V1}
    pbkdf2-iter: 200000
    salt-len: 16
    iv-len: 12

# Actuator 설정
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  health:
    redis:
      enabled: true
    db:
      enabled: true